<div th:fragment="AgregarServicio">
  <div id="modalServicio" class="modal">
    <div class="modal-content">

      <div class="modal-header">
        <h2 id="modalTitleServicio">Agregar Servicio</h2>
        <span class="close close-btn" data-close="modalServicio">&times;</span>
      </div>

      <form id="formServicio"
            th:action="@{/private/admin/guardarServicio}"
            method="post"
            th:object="${servicioActual}">

        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" id="servicioId" name="id" th:value="${servicioActual.id}" />

        <div class="form-group">
          <label>Tipo de Servicio</label>
          <input type="text"
                 id="tipoServicio"
                 name="tipoServicio"
                 th:value="${servicioActual.tipoServicio}"
                 required
                 placeholder="Ej: Construcción de muros" />
          <small id="errorTipoServicio" class="field-error"></small>
        </div>

        <div class="form-group">
          <label>Precio</label>
          <input type="number"
                 id="precioServicio"
                 name="precioServicio"
                 th:value="${servicioActual.precioServicio}"
                 step="1" min="1" required
                 placeholder="Ej: 150000" />
          <small id="errorPrecioServicio" class="field-error"></small>
          <small class="field-hint">Valor en COP, mayor a 0</small>
        </div>

        <button type="submit" id="btnGuardarServicio" class="btn-guardar">Guardar</button>
      </form>
    </div>
  </div>
</div>
