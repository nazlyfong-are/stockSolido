<div th:fragment="AgregarSolicitud">
  <div id="modalSolicitud" class="modal">
    <div class="modal-content">

      <div class="modal-header">
        <h2 id="modalTitleSolicitud">Agregar Solicitud</h2>
        <span class="close" id="closeModalSolicitud">&times;</span>
      </div>

      <form id="formSolicitud" th:action="@{/private/admin/guardarSolicitud}" method="post"
        th:object="${solicitudActual}">

        <input type="hidden" id="solicitudId" name="id" th:value="${solicitudActual.id}" />

        <!-- Campos ocultos del cliente embebido -->
        <input type="hidden" id="clienteIdHidden"        name="cliente.clienteId" />
        <input type="hidden" id="clienteNombreHidden"    name="cliente.nombre" />
        <input type="hidden" id="clienteDocumentoHidden" name="cliente.documento" />
        <input type="hidden" id="clienteTipoHidden"      name="cliente.tipo" />
        <input type="hidden" id="clienteCorreoHidden"    name="cliente.correo" />
        <input type="hidden" id="clienteTelefonoHidden"  name="cliente.telefono" />

        <div class="form-group">
          <label>Cliente</label>
          <div class="searchable-select" id="clienteSelectWrapper">
            <div class="searchable-select__display" id="clienteDisplay" tabindex="0">
              <span id="clienteDisplayText" class="searchable-select__placeholder">Seleccione un cliente</span>
              <span class="searchable-select__arrow">&#9660;</span>
            </div>
            <div class="searchable-select__dropdown" id="clienteDropdown">
              <input
                type="text"
                class="searchable-select__input"
                id="clienteSearchInput"
                placeholder="Buscar por nombre o documento..."
                autocomplete="off"
              />
              <ul class="searchable-select__list" id="clienteList">
                <li class="searchable-select__item searchable-select__empty" data-value="">Seleccione un cliente</li>
                <li
                  th:each="cliente : ${listaClientes}"
                  class="searchable-select__item"
                  th:attr="
                    data-value=${cliente.id},
                    data-nombre=${cliente.nombre},
                    data-documento=${cliente.documento},
                    data-tipo=${cliente.tipo},
                    data-correo=${cliente.correo},
                    data-telefono=${cliente.telefono}"
                  th:text="${cliente.nombre} + ' — ' + ${cliente.documento}">
                </li>
              </ul>
              <p class="searchable-select__no-results" id="clienteNoResults" style="display:none;">Sin resultados</p>
            </div>
          </div>
          <small id="errorCliente" class="field-error" style="display:none;">Debe seleccionar un cliente.</small>
        </div>

        <!-- Campo oculto del precio del servicio embebido -->
        <input type="hidden" id="servicioPrecioHidden" name="servicio.precioUnitario" />

      
        <div class="form-group">
          <label>Tipo de Servicio</label>
          <input type="hidden" id="tipoServicioHidden" name="servicio.tipoServicio" />
          <div class="searchable-select" id="servicioSelectWrapper">
            <div class="searchable-select__display" id="servicioDisplay" tabindex="0">
              <span id="servicioDisplayText" class="searchable-select__placeholder">Seleccione un servicio</span>
              <span class="searchable-select__arrow">&#9660;</span>
            </div>
            <div class="searchable-select__dropdown" id="servicioDropdown">
              <input
                type="text"
                class="searchable-select__input"
                id="servicioSearchInput"
                placeholder="Buscar servicio..."
                autocomplete="off"
              />
              <ul class="searchable-select__list" id="servicioList">
                <li class="searchable-select__item searchable-select__empty" data-value="" data-precio="0">Seleccione un servicio</li>
                <li
                  th:each="servicio : ${tiposServicio}"
                  class="searchable-select__item"
                  th:attr="
                    data-value=${servicio.tipoServicio},
                    data-precio=${servicio.precioServicio}"
                  th:text="${servicio.tipoServicio}">
                </li>
              </ul>
              <p class="searchable-select__no-results" id="servicioNoResults" style="display:none;">Sin resultados</p>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Número de Servicios</label>
          <input type="number" id="noServicios" name="noServicios" min="1" required />
        </div>

        <!-- Total calculado (solo lectura) -->
        <div class="form-group">
          <label>Total</label>
          <input type="text" id="totalMostrado" readonly placeholder="$0.00" />
          <input type="hidden" id="total" name="total" />
        </div>

        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="fecha" name="fecha" required />
          <small id="errorFecha" class="field-error"></small>
          <small class="field-hint">No se permiten domingos ni fechas pasadas.</small>
        </div>

        <div class="form-group">
          <label>Hora</label>
          <input type="time" id="hora" name="hora" required min="07:00" max="18:30" />
          <small id="errorHora" class="field-error"></small>
          <small class="field-hint">Horario permitido: 7:00 AM – 6:30 PM</small>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea id="descripcion" name="descripcion" maxlength="150" rows="3" required></textarea>
          <small id="contadorDescripcion">0 / 150</small>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select id="estado" name="estado">
            <option value="En espera">En espera</option>
            <option value="En proceso">En proceso</option>
            <option value="Finalizado">Finalizado</option>
          </select>
        </div>

        <button type="submit" class="btn-guardar" id="btnGuardarSolicitud">Guardar</button>

      </form>
    </div>
  </div>

  <!--modal filtrar solicitudes -->
  <div id="filterRequestModal" class="modal">
    <div class="modal-content modal-content--narrow">
      <div class="modal-header">
        <h2 id="filterTitle">Filtrar por</h2>
        <span class="close" id="closeFilterRequest">&times;</span>
      </div>
      <div class="modal-body">
        <div id="filterStep1">
          <button class="filter-option" id="filterByPrecio">Precio</button>
          <button class="filter-option" id="filterByFecha">Fecha</button>
          <button class="filter-option" id="filterByEstado">Estado</button>
          <button class="filter-option" id="filterByTipoServicio">Tipo de servicio</button>
          <button class="filter-option filter-limpiar" id="filterLimpiar">Quitar filtros</button>
        </div>
        <div id="filterStep2" class="hidden">
          <button class="filter-back" id="filterBack">← Volver</button>
          <div id="filterOpciones" class="filter-opciones-container"></div>
        </div>
      </div>
    </div>
  </div>

</div>
